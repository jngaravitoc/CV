name: Update CV & Publications

on:
  schedule:
    # Run on the 1st of every month at 06:00 UTC
    - cron: "0 6 1 * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install requests

      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra

      - name: Run update_pubs.sh
        env:
          ADS_TOKEN: ${{ secrets.ADS_TOKEN }}
        run: |
          chmod +x scripts/update_pubs.sh
          bash scripts/update_pubs.sh

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          # Only commit if there are changes
          git diff --cached --quiet || git commit -m "Auto-update CV and publications ($(date '+%Y-%m-%d'))"
          git push
